<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeplyzer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
:root{--bg:#0a0012;--surface:#1a1420;--text:#fff;--muted:#aaa;--accent:#45c2e5}
*{transition:background .2s,border-color .2s,box-shadow .2s,color .2s}
html,body{margin:0;padding:0;width:100%;min-height:100vh;overflow-y:auto}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,-apple-system,sans-serif}
h1{font-size:1.5rem;font-weight:900;color:var(--accent)}
.search{background:var(--surface);border:2px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem 1rem;color:var(--text);font-size:.95rem;width:100%;margin-bottom:1rem}
.search:focus{outline:none;border-color:var(--accent)}
.card{background:var(--surface);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:.75rem;cursor:pointer;position:relative}
.card:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(69,194,229,.3)}
.card.selected{border-color:#22c55e}
.card.greyed{opacity:.4;pointer-events:none}
.card img{width:100%;aspect-ratio:1;object-fit:contain;background:#000;border-radius:8px}
.card-title{font-size:.9rem;margin-top:.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;color:var(--accent)}
.card-type{font-size:.7rem;color:var(--muted);text-transform:uppercase;margin-top:.15rem}
.card-lb{position:absolute;top:5px;left:5px;background:#8b5cf6;color:#fff;font-size:.65rem;font-weight:900;padding:2px 6px;border-radius:4px}
.card-stats{display:flex;gap:.4rem;margin-top:.4rem}
.pill{font-size:.8rem;padding:.2rem .5rem;border-radius:4px;font-weight:700}
.pill.race{color:#f59e0b}
.pill.fan{color:#ec4899}
.sidebar{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:1rem}
.sidebar h2{font-size:1rem;font-weight:800;color:var(--accent);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid rgba(255,255,255,.1)}
.deck-card{display:flex;gap:.75rem;padding:.6rem;background:rgba(0,0,0,.3);border-radius:6px;margin-bottom:.5rem;align-items:center}
.deck-card img{width:2.5rem;height:2.5rem;object-fit:contain;background:#000;border-radius:4px}
.deck-card-info{flex:1;min-width:0}
.deck-card-name{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--accent)}
.deck-card-stats{font-size:.8rem;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:.3rem}
.deck-card-stats .lb{color:var(--accent)}
.deck-card-stats .race{color:#f59e0b;font-weight:700}
.deck-card-stats .fan{color:#ec4899;font-weight:700}
.lb-selector{display:flex;gap:.25rem;margin-top:.3rem}
.lb-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--muted);padding:.1rem .4rem;border-radius:4px;cursor:pointer;font-size:.7rem}
.lb-btn:hover{border-color:var(--accent);color:var(--accent)}
.lb-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.btn-remove{background:transparent;border:2px solid rgba(255,255,255,.2);color:var(--muted);width:1.5rem;height:1.5rem;border-radius:50%;cursor:pointer;font-size:.8rem}
.btn-remove:hover{background:#ef4444;border-color:#ef4444;color:#fff}
.stats{margin-top:1rem;padding-top:.75rem;border-top:2px solid rgba(255,255,255,.1)}
.stat-row{display:flex;justify-content:space-between;padding:.3rem 0;font-size:.9rem}
.stat-label{color:var(--muted)}
.stat-value{font-weight:700}
.filter-btn{background:transparent;border:2px solid rgba(255,255,255,.1);color:var(--muted);padding:.4rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem;text-transform:uppercase;font-weight:700}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
#cardGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem}
.filters{display:flex;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap}
.btn-exit-rank{background:#ef4444;color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:.85rem;margin-bottom:.5rem}
.btn-exit-rank:hover{opacity:.9}
.rank-sort{display:flex;gap:.4rem;margin-bottom:.5rem}
.rank-sort-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:.3rem .6rem;color:var(--text);font-size:.75rem;cursor:pointer}
.rank-sort-btn:hover{border-color:var(--accent)}
.rank-sort-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.sim-panel{margin-top:1rem;padding-top:.75rem;border-top:2px solid rgba(255,255,255,.1)}
.sim-row{display:flex;align-items:center;gap:.5rem;padding:.3rem 0}
.sim-label{color:var(--muted);font-size:.85rem;min-width:6rem}
.sim-value{color:var(--accent);font-weight:700;min-width:3rem;text-align:right}
.sim-row input[type="range"]{flex:1}
.btn-sim{background:var(--accent);color:#000;border:none;padding:.6rem 1.5rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:1rem;width:100%;margin-top:.5rem}
.btn-sim:hover{opacity:.9}
.btn-sim:disabled{opacity:.5;cursor:not-allowed}
.btn-rank{background:#8b5cf6;color:#fff;border:none;padding:.6rem 1.5rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:1rem;width:100%;margin-top:.5rem}
.btn-rank:hover{opacity:.9}
.btn-rank:disabled{opacity:.5;cursor:not-allowed}
.rank-pool{position:relative;min-height:140px;border:2px dashed rgba(255,255,255,.15);border-radius:6px;padding:.5rem;margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.5rem;align-content:flex-start}
.rank-pool.drag-over{border-color:var(--accent);background:rgba(69,194,229,.05)}
.rank-pool-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:.85rem;text-align:center;pointer-events:none;z-index:1}
.rank-pool-header{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:.3rem}
.rank-pool-header span{font-size:.75rem;font-weight:700;color:var(--muted)}
.rank-pool-header .clear-btn,.rank-pool-header .btn-clear-rank{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:0}
.rank-pool-header .clear-btn:hover,.rank-pool-header .btn-clear-rank:hover{color:#ef4444}
.rank-pool-header{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:.3rem}
.rank-pool-header .clear-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.7rem}
.rank-pool-header .clear-btn:hover{color:#ef4444}
.btn-clear-rank{background:#8b5cf6;color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem;margin-top:.5rem}
.btn-clear-rank:hover{opacity:.9}
.rank-card{background:var(--surface);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:.4rem;cursor:grab;width:calc(33.33% - .35rem);box-sizing:border-box}
.rank-card:active{cursor:grabbing}
.rank-card img{width:100%;aspect-ratio:1;object-fit:contain;background:#000;border-radius:6px}
.rank-card-title{font-size:.7rem;margin-top:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;color:var(--accent)}
.rank-card-type{font-size:.6rem;color:var(--muted);text-transform:uppercase;margin-top:.1rem}
.rank-card-stats{display:flex;gap:.3rem;margin-top:.3rem}
.rank-card .pill{font-size:.65rem;padding:.15rem .4rem;border-radius:3px;font-weight:700}
.rank-card .pill.race{color:#f59e0b}
.rank-card .pill.fan{color:#ec4899}
.results{margin-top:1rem;padding:.75rem;background:rgba(0,0,0,.3);border-radius:8px}
.results h3{font-size:.9rem;color:var(--accent);margin-bottom:.5rem}
.result-row{display:flex;justify-content:space-between;padding:.2rem 0;font-size:.85rem}
.result-label{color:var(--muted)}
.result-value{font-weight:700;color:#22c55e}
.result-view{background:var(--surface);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:1rem}
.race-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-top:.5rem}
.race-cell{width:100%;aspect-ratio:1;border:1px solid rgba(255,255,255,.1);border-radius:3px;cursor:pointer;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:700;text-align:center;line-height:1}
.race-cell:hover{border-color:var(--accent)}
.race-cell.G1{background:#f59e0b;color:#000}
.race-cell.G2{background:#3b82f6;color:#fff}
.race-cell.G3{background:#8b5cf6;color:#fff}
.race-cell.summer{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4)}
.race-cell.empty{background:rgba(255,255,255,.03)}
.race-grade-sel{display:flex;gap:.3rem;margin-top:.3rem}
.race-grade-btn{padding:.2rem .6rem;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:700}
.race-grade-btn:hover{border-color:var(--accent)}
.race-grade-btn.active{border-color:transparent}
.race-grade-btn.active[data-grade="G1"]{background:#f59e0b;color:#000}
.race-grade-btn.active[data-grade="G2"]{background:#3b82f6;color:#fff}
.race-grade-btn.active[data-grade="G3"]{background:#8b5cf6;color:#fff}
.race-grade-btn.active[data-grade="clear"]{background:#ef4444;color:#fff}
.stat-bonus-row{display:flex;align-items:center;gap:.4rem;margin-top:.3rem;font-size:.75rem}
.stat-bonus-row .stat-label-s{width:3.5rem;color:var(--muted);font-weight:700;text-transform:uppercase}
.stat-bonus-row input[type=range]{width:70px;margin:0}
.stat-bonus-row .stat-val{color:var(--accent);font-weight:700;width:2rem;text-align:right}
.starting-row{display:flex;align-items:center;gap:.4rem;margin-top:.2rem;font-size:.75rem}
.starting-row .stat-label-s{width:3.5rem;color:var(--muted);font-weight:700;text-transform:uppercase}
.starting-row input[type=number]{background:var(--surface);border:1px solid rgba(255,255,255,.2);border-radius:4px;color:var(--accent);font-weight:700;width:3rem;padding:.15rem .3rem;font-size:.75rem;text-align:center}
.view-toggle{display:flex;gap:.25rem;margin-bottom:.75rem}
.btn-toggle{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--muted);padding:.3rem .8rem;border-radius:4px;cursor:pointer;font-size:.8rem;font-weight:600}
.btn-toggle:hover{border-color:var(--accent);color:var(--accent)}
.btn-toggle.active{background:var(--accent);border-color:var(--accent);color:#000}
.dist-graph{margin-bottom:1.25rem}
.dist-label{font-weight:700;color:var(--accent);font-size:.9rem;margin-bottom:.4rem}
.dist-axis{position:relative;padding-bottom:.6rem}
.dist-tick{position:absolute;bottom:0;font-size:.7rem;color:var(--muted);transform:translateX(-50%)}
.dist-tick:first-child{transform:translateX(0)}
.dist-tick:last-child{transform:translateX(-100%)}
.dist-bar{position:relative;height:.8rem;background:rgba(255,255,255,.08);border-radius:4px;margin-top:.7rem}
.dist-iqr{position:absolute;top:0;height:100%;background:rgba(69,194,229,.4);border-radius:3px}
.dist-median{position:absolute;top:-4px;width:12px;height:calc(100% + 8px);background:#45c2e5;border-radius:3px;transform:translateX(-50%)}
.dist-avg-marker{position:absolute;top:-5px;width:10px;height:calc(100% + 10px);background:#22c55e;border-radius:50%;transform:translateX(-50%)}
.dist-legend{display:flex;gap:1rem;font-size:.75rem;color:var(--muted);margin-top:.35rem;align-items:center}
.dist-dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.dist-dot.median{background:#45c2e5}
.dist-dot.iqr{background:rgba(69,194,229,.4)}
.dist-avg-val{color:#22c55e;font-weight:700;margin-left:auto}
.dist-cursor-tooltip{position:absolute;top:-22px;transform:translateX(-50%);background:var(--accent);color:#000;padding:2px 6px;border-radius:3px;font-size:.65rem;font-weight:700;display:none;white-space:nowrap}
.rank-badge{position:absolute;top:5px;right:5px;background:var(--accent);color:#000;font-size:.65rem;font-weight:900;padding:2px 6px;border-radius:4px;box-shadow:0 2px 4px rgba(0,0,0,.3);z-index:10}
.progress-container{margin-top:.75rem}
.progress-bar{height:1.5rem;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);width:0;transition:width .1s ease}
.progress-text{font-size:.85rem;color:var(--muted);margin-top:.3rem;text-align:center}
.timeline-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-top:.5rem}
.timeline-cell{width:100%;aspect-ratio:1;border:1px solid rgba(255,255,255,.1);border-radius:3px;cursor:pointer;font-size:.55rem;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;text-align:center;line-height:1;position:relative}
.timeline-cell:hover{border-color:var(--accent)}
.timeline-cell.junior,.timeline-cell.classic,.timeline-cell.spring,.timeline-cell.senior{background:rgba(69,194,229,.2);border-color:rgba(69,194,229,.4)}
.timeline-cell.race{background:#f59e0b;color:#000}
.timeline-tooltip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1a1420;border:1px solid var(--accent);border-radius:6px;padding:.5rem;z-index:100;white-space:nowrap;font-size:.7rem;display:none}
.timeline-cell:hover .timeline-tooltip{display:block}
.timeline-graph{margin-top:1rem;padding:.75rem;background:rgba(0,0,0,.3);border-radius:8px}
.timeline-graph h4{font-size:.85rem;color:var(--accent);margin-bottom:.5rem}
.tg-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.tg-label{min-width:3rem;font-size:.75rem;color:var(--muted);font-weight:700}
.tg-bar-wrap{flex:1;height:.6rem;background:rgba(255,255,255,.08);border-radius:4px;position:relative}
.tg-bar{height:100%;border-radius:4px;transition:width .3s}
.tg-bar.speed{background:#45c2e5}.tg-bar.stamina{background:#22c55e}.tg-bar.power{background:#f59e0b}.tg-bar.guts{background:#ec4899}.tg-bar.wits{background:#8b5cf6}.tg-bar.sp{background:#06b6d4}
.tg-val{min-width:3rem;text-align:right;font-size:.7rem;color:var(--accent);font-weight:700}
.facility-info{margin-top:.5rem;font-size:.7rem;color:var(--muted);display:flex;gap:.5rem;flex-wrap:wrap}
.facility-info span{padding:.1rem .4rem;background:rgba(255,255,255,.05);border-radius:3px}
.timeline-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1420;border:2px solid var(--accent);border-radius:12px;padding:1rem;z-index:1000;min-width:200px;box-shadow:0 0 40px rgba(69,194,229,.4)}
.timeline-popup h4{font-size:.9rem;color:var(--accent);margin:0 0 .5rem 0;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:.3rem}
.stat-graph{width:100%;height:60px;margin-bottom:.3rem}
.stat-graph-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.stat-graph-label{font-size:.7rem;color:var(--muted);min-width:3rem;font-weight:700}
.stat-graph-canvas{flex:1;height:40px;background:rgba(0,0,0,.3);border-radius:4px}
    </style>
</head>
<body>
    <div class="container-fluid px-4 py-3">
        <header class="mb-3 pb-2" style="border-bottom:2px solid rgba(255,255,255,.1)">
            <h1>Sweeplyzer</h1>
        </header>
        <div class="row">
            <div class="col-12 col-lg-9">
                <input type="text" class="search" id="search" placeholder="Search...">
                <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem">
                    <div class="filters" id="filters"></div>
                    <button class="btn-exit-rank" id="btnExitRank" style="display:none" onclick="rankPool=[];cardRankings=null;renderPool();renderCardGrid();renderRankSort();">Exit Ranking</button>
                </div>
                <div id="cardGrid"></div>
            </div>
            <div class="col-12 col-lg-3">
                <div class="sidebar">
                    <h2>Deck (<span id="deckCount">0</span>/6)</h2>
                    <div id="deckList"></div>
                    <div class="stats" id="stats"></div>
                    
                    <div class="sim-panel">
                        <div class="sim-row">
                            <span class="sim-label">Training Days</span>
                            <span class="sim-value" id="turnsValue">72</span>
                            <input type="range" id="turnsSlider" min="20" max="78" value="72">
                        </div>
                        
                        <div class="sim-row">
                            <span class="sim-label">Simulations</span>
                            <span class="sim-value" id="simsValue">3000</span>
                            <input type="range" id="simsSlider" min="1" max="10000" value="3000">
                        </div>
                        
                        <div style="margin-top:.75rem;padding-top:.5rem;border-top:1px solid rgba(255,255,255,.1)">
                            <div class="sim-row"><span class="sim-label">Stat Bonus</span><span class="sim-value" id="bonusTotal">30%</span></div>
                            <div class="stat-bonus-row"><span class="stat-label-s">Spd</span><input type="range" min="0" max="30" value="6" id="bonusSpd"><span class="stat-val" id="bonusSpdVal">6%</span></div>
                            <div class="stat-bonus-row"><span class="stat-label-s">Sta</span><input type="range" min="0" max="30" value="6" id="bonusSta"><span class="stat-val" id="bonusStaVal">6%</span></div>
                            <div class="stat-bonus-row"><span class="stat-label-s">Pow</span><input type="range" min="0" max="30" value="6" id="bonusPow"><span class="stat-val" id="bonusPowVal">6%</span></div>
                            <div class="stat-bonus-row"><span class="stat-label-s">Gut</span><input type="range" min="0" max="30" value="6" id="bonusGut"><span class="stat-val" id="bonusGutVal">6%</span></div>
                            <div class="stat-bonus-row"><span class="stat-label-s">Wis</span><input type="range" min="0" max="30" value="6" id="bonusWis"><span class="stat-val" id="bonusWisVal">6%</span></div>
                        </div>
                        
                        <div style="margin-top:.75rem;padding-top:.5rem;border-top:1px solid rgba(255,255,255,.1)">
                            <div class="sim-row"><span class="sim-label">Starting Stats</span></div>
                            <div class="starting-row"><span class="stat-label-s">Spd</span><input type="number" min="1" max="999" value="88" id="startSpd"></div>
                            <div class="starting-row"><span class="stat-label-s">Sta</span><input type="number" min="1" max="999" value="88" id="startSta"></div>
                            <div class="starting-row"><span class="stat-label-s">Pow</span><input type="number" min="1" max="999" value="88" id="startPow"></div>
                            <div class="starting-row"><span class="stat-label-s">Gut</span><input type="number" min="1" max="999" value="88" id="startGut"></div>
                            <div class="starting-row"><span class="stat-label-s">Wis</span><input type="number" min="1" max="999" value="88" id="startWis"></div>
                        </div>
                        
                        <div style="margin-top:.75rem;padding-top:.5rem;border-top:1px solid rgba(255,255,255,.1)">
                            <div class="sim-row">
                                <span class="sim-label">Race Schedule</span>
                                <span class="sim-value" id="raceCount">0</span>
                            </div>
                            <div class="race-grade-sel">
                                <button class="race-grade-btn active" data-grade="G1">G1</button>
                                <button class="race-grade-btn" data-grade="G2">G2</button>
                                <button class="race-grade-btn" data-grade="G3">G3</button>
                                <button class="race-grade-btn" data-grade="clear">X</button>
                            </div>
                            <div class="race-grid" id="raceGrid"></div>
                        </div>
                        
                        <div class="rank-pool" id="rankPool">
                            <div class="rank-pool-header">
                                <span style="font-size:.7rem;font-weight:700;color:var(--muted)">Rank Pool (<span id="poolCount">0</span>)</span>
                                <div style="display:flex;gap:.5rem">
                                    <button class="clear-btn" id="btnClearPool">Clear Pool</button>
                                    <button class="btn-clear-rank" id="btnClearRank" style="display:none">Clear Rankings</button>
                                </div>
                            </div>
                            <div class="rank-pool-empty" id="poolEmpty">Drag cards here</div>
                            <div id="poolCards" style="display:flex;flex-wrap:wrap;gap:.5rem;width:100%"></div>
                        </div>
                        
                        <button class="btn-sim" id="btnSim" disabled>Run Simulation</button>
                        <button class="btn-rank" id="btnRank" disabled>Rank Pool</button>
                    </div>
                    
                    <div id="results"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
let allCards=[], uniqueEffectsData=[], deck=[], rankPool=[], filterType='all', searchText='';
let simTurns=72, simCount=10000;
let raceSchedule={}, raceGrade='G1';
let cardRankings=null;
let cardElementMap=null;
const SUMMER=new Set([37,38,39,40,61,62,63,64]);
const NO_IMG='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect fill=%27%23111%27 width=%27100%27 height=%27100%27/%3E%3C/svg%3E';
const bonusIds=['bonusSpd','bonusSta','bonusPow','bonusGut','bonusWis'];

async function init(){
    try{
        allCards=await fetch('data/cards.json').then(r=>{
            if(!r.ok)throw new Error('Failed to load cards');
            return r.json();
        });
        uniqueEffectsData=await fetch('data/unique_effects.json').then(r=>r.ok?r.json():[]).catch(()=>[]);
        if(!allCards.length)throw new Error('No cards returned');
        renderFilters();
        renderCards();
        renderDeck();
        renderPool();
    }catch(e){
        console.error('Init error:', e);
        document.getElementById('cardGrid').innerHTML='<p style="color:var(--muted);padding:2rem">Error loading data. Serve via http-server or GitHub Pages.</p>';
    }
}

function getVal(card,l,k){return ((card.effects||[])[l]||{})[k]||0;}

function renderFilters(){
    const types=['all','speed','stamina','power','guts','wisdom','friend','group'];
    document.getElementById('filters').innerHTML=types.map(t=>`<button class="filter-btn ${t===filterType?'active':''}" data-type="${t}">${t}</button>`).join('');
    document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{
        filterType=b.dataset.type;
        document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        renderCardGrid();
    });
}

function renderCards(){
    if(!allCards || allCards.length === 0){
        return;
    }
    let cardsHTML='';
    for(let c of allCards){
        for(let lb=4; lb>=0; lb--){
            let cardId=c.id+'_lb'+lb;
            cardsHTML+=`<div class="card" draggable="true" data-id="${cardId}" data-base-id="${c.id}" data-lb="${lb}">
                <img src="${c.image_url}" onerror="this.src='${NO_IMG}'" loading="eager">
                <div class="card-title">${c.title}</div>
                <div class="card-lb">LB${lb}</div>
                <div class="card-type">${c.type||''}</div>
                <div class="card-stats">
                    <span class="pill race">${getVal(c,lb,'race_bonus')}</span>
                    <span class="pill fan">${getVal(c,lb,'fan_bonus')}</span>
                </div>
            </div>`;
        }
    }
    document.getElementById('cardGrid').innerHTML=cardsHTML;
    
    cardElementMap=new Map();
    document.querySelectorAll('.card').forEach(el=>{
        cardElementMap.set(el.dataset.id, el);
    });
    
    window.addEventListener('dragover', e => {
        const threshold = 100;
        const y = e.clientY;
        const height = window.innerHeight;
        if (y < threshold) {
            window.scrollBy(0, -10);
        } else if (y > height - threshold) {
            window.scrollBy(0, 10);
        }
    });
    
    document.querySelectorAll('.card').forEach(el=>{
        el.ondragstart=e=>{
            e.dataTransfer.setData('text/plain',el.dataset.id);
            el.style.opacity='.3';
        };
        el.ondragend=e=>{
            el.style.opacity='1';
        };
        el.onclick=()=>{
            let baseId=el.dataset.baseId, lb=+el.dataset.lb, card=allCards.find(x=>x.id===baseId);
            let deckTitles=new Set(deck.map(x=>x.card.title));
            let poolTitles=new Set(rankPool.map(x=>x.card.title));
            let inDeckIdx=deck.findIndex(x=>x.id===baseId && x.lb===lb);
            if(inDeckIdx>=0){
                deck.splice(inDeckIdx,1);
            }else if(deckTitles.has(card.title)){
                deck=deck.filter(x=>x.card.title!==card.title);
            }else if(poolTitles.has(card.title)){
                rankPool=rankPool.filter(x=>x.card.title!==card.title);
            }else if(deck.length<6){
                deck.push({id:baseId,card,lb});
            }else{
                if(!poolTitles.has(card.title)){
                    for(let l=0;l<=4;l++)rankPool.push({id:baseId,card,lb:l});
                }
            }
            cardRankings=null;
            renderCardGrid();
            renderDeck();
            renderPool();
        };
    });
}

function renderRankSort(){
    const exitBtn=document.getElementById('btnExitRank');
    if(cardRankings){
        if(exitBtn)exitBtn.style.display='block';
        document.querySelectorAll('.card').forEach(el=>el.style.pointerEvents='none');
    }else{
        if(exitBtn)exitBtn.style.display='none';
        document.querySelectorAll('.card').forEach(el=>el.style.pointerEvents='auto');
    }
    renderCardGrid();
}

function renderCardGrid(){
    let baseFiltered=allCards.filter(x=>filterType==='all'||x.type===filterType);
    if(searchText)baseFiltered=baseFiltered.filter(x=>x.title.toLowerCase().includes(searchText.toLowerCase()));
    
    let deckCards=deck.map(x=>x.id+'_lb'+x.lb);
    let deckSet=new Set(deckCards);
    
    let list=[];
    
    if(cardRankings){
        let sorted=[...cardRankings].sort((a,b)=>b.avgScore-a.avgScore);
        let rankMap=new Map();
        sorted.forEach((r,i)=>rankMap.set(r.baseId+'_lb'+r.lb,i));
        for(let r of sorted){
            let card=allCards.find(x=>x.id===r.baseId);
            if(!card){
                continue;
            }
            if(filterType!=='all' && card.type!==filterType)continue;
            if(searchText && !card.title.toLowerCase().includes(searchText.toLowerCase()))continue;
            list.push({baseId:r.baseId, card, lb:r.lb, rank:rankMap.get(r.baseId+'_lb'+r.lb)});
        }
    }else{
        for(let c of baseFiltered){
            for(let lb=4; lb>=0; lb--){
                list.push({baseId:c.id, card:c, lb});
            }
        }
    }
    
    let deckTitles=new Set(deck.map(x=>x.card.title));
    let poolCards=new Set(rankPool.map(x=>x.id+'_lb'+x.lb));
    let selectedCards=list.filter(i=>deckSet.has(i.baseId+'_lb'+i.lb));
    let otherCards=list.filter(i=>!deckSet.has(i.baseId+'_lb'+i.lb) && !deckTitles.has(i.card.title));
    if(!cardRankings){
        otherCards=otherCards.filter(i=>!poolCards.has(i.baseId+'_lb'+i.lb));
    }
    
    list=[...selectedCards,...otherCards];
    
    let listSet=new Set(list.map(i=>i.baseId+'_lb'+i.lb));
    let grid=document.getElementById('cardGrid');
    grid.innerHTML='';
    list.forEach(i=>{
        let el=cardElementMap.get(i.baseId+'_lb'+i.lb);
        if(el){
            let existingBadge=el.querySelector('.rank-badge');
            if(existingBadge)existingBadge.remove();
            el.classList.toggle('selected',deckSet.has(i.baseId+'_lb'+i.lb));
            el.style.display='block';
            grid.appendChild(el);
            if(cardRankings && !deckSet.has(i.baseId+'_lb'+i.lb)){
                if(i.rank!==undefined){
                    let badge=document.createElement('div');
                    badge.className='rank-badge';
                    badge.textContent=`#${i.rank+1}`;
                    el.appendChild(badge);
                }
            }
        }
    });
    
    cardElementMap.forEach((el,key)=>{
        if(listSet.has(key))return;
        let elTitle=el.querySelector('.card-title')?.textContent;
        if(deckTitles.has(elTitle)){
            el.style.display='none';
        }else if(!cardRankings && poolCards.has(key)){
            el.style.display='none';
        }
    });
}

function renderDeck(){
    document.getElementById('deckCount').textContent=deck.length;
    document.getElementById('btnSim').disabled=deck.length===0;
    if(!deck.length){document.getElementById('deckList').innerHTML='';document.getElementById('stats').innerHTML='';return;}
    document.getElementById('deckList').innerHTML=deck.map((item,idx)=>`<div class="deck-card">
        <img src="${item.card.image_url}" onerror="this.src='${NO_IMG}'">
        <div class="deck-card-info">
            <div class="deck-card-name">${item.card.title} <span style="color:var(--accent)">LB${item.lb}</span></div>
            <div class="deck-card-stats">
                <span class="race">${getVal(item.card,item.lb,'race_bonus')}</span> / 
                <span class="fan">${getVal(item.card,item.lb,'fan_bonus')}</span>
            </div>
        </div>
        <button class="btn-remove" data-key="${item.id}_lb${item.lb}">x</button>
    </div>`).join('');
    document.querySelectorAll('.btn-remove').forEach(b=>b.onclick=e=>{
        e.stopPropagation();
        let key=b.dataset.key;
        let idx=deck.findIndex(x=>x.id+'_lb'+x.lb===key);
        if(idx>=0){
            let removed=deck.splice(idx,1)[0];
            rankPool=rankPool.filter(x=>x.card.title!==removed.card.title);
        }
        cardRankings=null;
        renderCardGrid();
        renderDeck();
    });
    let tR=0, tF=0;
    deck.forEach(i=>{tR+=getVal(i.card,i.lb,'race_bonus');tF+=getVal(i.card,i.lb,'fan_bonus');});
    document.getElementById('stats').innerHTML=`<div class="stat-row"><span class="stat-label">Race Bonus</span><span class="stat-value" style="color:#f59e0b">${tR}%</span></div>
        <div class="stat-row"><span class="stat-label">Fan Bonus</span><span class="stat-value" style="color:#ec4899">${tF}%</span></div>`;
}

function renderPool(){
    let poolEl=document.getElementById('rankPool');
    poolEl.ondragover=e=>{e.preventDefault();poolEl.classList.add('drag-over')};
    poolEl.ondragleave=()=>poolEl.classList.remove('drag-over');
    poolEl.ondrop=e=>{
        e.preventDefault();
        poolEl.classList.remove('drag-over');
        let key=e.dataTransfer.getData('text/plain');
        if(!key)return;
        let [baseId,lbStr]=key.split('_lb');
        let card=allCards.find(x=>x.id===baseId);
        if(!card)return;
        let deckTitles=new Set(deck.map(x=>x.card.title));
        if(deckTitles.has(card.title))return;
        for(let lb=0; lb<=4; lb++){
            if(rankPool.some(x=>x.id===baseId && x.lb===lb))continue;
            rankPool.push({id:baseId,card,lb});
        }
        renderPool();
        renderCardGrid();
    };
    document.getElementById('btnRank').disabled=rankPool.length===0;
    document.getElementById('poolCount').textContent=rankPool.length;
    let clearRankBtn=document.getElementById('btnClearRank');
    if(clearRankBtn)clearRankBtn.style.display=cardRankings?'block':'none';
    let emptyEl=document.getElementById('poolEmpty');
    if(emptyEl)emptyEl.style.display=rankPool.length?'none':'block';
    if(!rankPool.length){
        document.getElementById('poolCards').innerHTML='';
        return;
    }
    document.getElementById('poolCards').innerHTML=rankPool.map(item=>`<div class="rank-card" draggable="true" data-key="${item.id}_lb${item.lb}">
        <img src="${item.card.image_url}" onerror="this.src='${NO_IMG}'">
        <div class="rank-card-title">${item.card.title}</div>
        <div class="rank-card-type">${item.card.type||''} LB${item.lb}</div>
        <div class="rank-card-stats">
            <span class="pill race">${getVal(item.card,item.lb,'race_bonus')}</span>
            <span class="pill fan">${getVal(item.card,item.lb,'fan_bonus')}</span>
        </div>
    </div>`).join('');
    document.querySelectorAll('.rank-card').forEach(el=>{
        el.ondragstart=e=>{
            e.dataTransfer.setData('text/plain',el.dataset.key);
            el.style.opacity='.3';
        };
        el.ondragend=e=>{
            el.style.opacity='1';
            let rect=poolEl.getBoundingClientRect();
            if(e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom){
                let key=el.dataset.key;
                let [id,lbStr]=key.split('_lb');
                let card=allCards.find(x=>x.id===id);
                if(card){
                    rankPool=rankPool.filter(x=>x.card.title!==card.title);
                }else{
                    let lb=parseInt(lbStr);
                    rankPool=rankPool.filter(x=>!(x.id===id && x.lb===lb));
                }
                renderPool();
                renderCardGrid();
            }
        };
        el.onclick=e=>{
            e.stopPropagation();
            let key=el.dataset.key;
            let [id,lbStr]=key.split('_lb');
            let card=allCards.find(x=>x.id===id);
            if(card){
                rankPool=rankPool.filter(x=>x.card.title!==card.title);
            }else{
                let lb=parseInt(lbStr);
                rankPool=rankPool.filter(x=>!(x.id===id && x.lb===lb));
            }
            renderPool();
            renderCardGrid();
        };
    });
}

function distGraph(label,d){
    let r=d.max-d.min||1;
    return `<div class="dist-graph">
        <div class="dist-label">${label}</div>
        <div class="dist-axis">
            <div class="dist-tick" style="left:0%">${d.min}</div>
            <div class="dist-tick" style="left:25%">${d.p25}</div>
            <div class="dist-tick" style="left:50%">${d.p50}</div>
            <div class="dist-tick" style="left:75%">${d.p75}</div>
            <div class="dist-tick" style="left:100%">${d.max}</div>
            <div class="dist-bar" onmousemove="hHover(this,${d.min},${d.max},event)" onmouseout="hOut(this,event)">
                <div class="dist-iqr" style="left:${((d.p25-d.min)/r*100).toFixed(1)}%;width:${((d.p75-d.p25)/r*100).toFixed(1)}%"></div>
                <div class="dist-median" style="left:${((d.p50-d.min)/r*100).toFixed(1)}%"></div>
                <div class="dist-avg-marker" style="left:${((d.mean-d.min)/r*100).toFixed(1)}%"></div>
                <div class="dist-cursor-tooltip"></div>
            </div>
        </div>
        <div class="dist-legend">
            <span class="dist-dot median"></span> Median ${d.p50}
            <span class="dist-dot iqr"></span> IQR ${d.p25}-${d.p75}
            <span class="dist-avg-val">${d.mean.toFixed(2)} avg</span>
        </div>
    </div>`;
}

function hHover(bar,min,max,e){
    let pct=Math.max(0,Math.min(100,(e.clientX-bar.getBoundingClientRect().left)/bar.offsetWidth*100));
    bar.querySelector('.dist-cursor-tooltip').textContent=(min+(pct/100)*(max-min)).toFixed(0);
    bar.querySelector('.dist-cursor-tooltip').style.left=pct+'%';
    bar.querySelector('.dist-cursor-tooltip').style.display='block';
}

function hOut(bar){bar.querySelector('.dist-cursor-tooltip').style.display='none';}

function getPeriodClass(turn){
    if(turn <= 24) return 'junior';
    if(turn <= 48) return 'classic';
    if(turn <= 60) return 'spring';
    return 'senior';
}

function renderTimeline(result){
    const tl = result.timeline;
    const maxTurns = result.max_turns;
    const grid = document.getElementById('timelineGrid');
    const facInfo = document.getElementById('facilityInfo');
    const graphs = document.getElementById('timelineGraphs');
    if(!tl || !tl.stat_history || tl.stat_history.length === 0){
        grid.innerHTML = '<div style="color:var(--muted);padding:1rem">No timeline data</div>';
        return;
    }
    const statNames = ['speed','stamina','power','guts','wits'];
    const statColors = ['#45c2e5','#22c55e','#f59e0b','#ec4899','#8b5cf6'];
    const cardPressTimeline = tl.card_presses_timeline || [];
    const opCountsTimeline = tl.operation_counts_timeline || [];
    
    window._tlData = { tl, cardPressTimeline, opCountsTimeline };
    
    const allStatData = statNames.map(s => tl.stat_history.map(h => h[s]||0));
    allStatData.push(tl.sp_history || []);
    statColors.push('#06b6d4');
    statNames.push('SP');
    const labels = ['Speed', 'Stamina', 'Power', 'Guts', 'Wits', 'SP'];
    
    graphs.innerHTML = 
        '<div style="margin-bottom:8px"><span style="font-size:14px;font-weight:600;color:var(--accent)">Stat Growth Over Time (Ura turns ignored)</span></div>' +
        '<div style="margin-bottom:1rem"><canvas id="canvas-merged" style="width:100%;height:120px;background:rgba(0,0,0,.3);border-radius:6px;cursor:crosshair"></canvas></div>';
    
    setTimeout(function() {
        drawMergedStatGraph('canvas-merged', allStatData, statColors, labels, tl.stat_history, tl.sp_history || []);
    }, 50);
    
    let html = '';
    for(let t = 0; t < maxTurns; t++){
        const period = getPeriodClass(t);
        html += '<div class="timeline-cell ' + period + '" data-turn="' + t + '">';
        html += '<span>' + (t + 1) + '</span></div>';
    }
    grid.innerHTML = html;
    
    document.querySelectorAll('.timeline-cell').forEach(cell => {
        cell.onmouseenter = function() {
            document.querySelectorAll('.timeline-popup').forEach(p => p.remove());
            const t = parseInt(this.dataset.turn);
            const d = window._tlData;
            showTimelinePopup(t, d.tl.stat_history[t], d.tl.facility_levels[t], d.tl.facility_presses[t], d.tl.sp_history ? d.tl.sp_history[t] : 0, d.cardPressTimeline[t], d.opCountsTimeline[t]);
        };
        cell.onmouseleave = function() {
            document.querySelectorAll('.timeline-popup').forEach(p => p.remove());
        };
    });
    
    facInfo.style.display = 'none';
}

function drawStatGraph(canvasId, data, color) {
    const canvas = document.getElementById(canvasId);
    if(!canvas || data.length === 0) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.offsetWidth || 200;
    const h = 40;
    canvas.width = w;
    canvas.height = h;
    ctx.clearRect(0, 0, w, h);
    if(data.length < 2) return;
    const max = Math.max(...data);
    const min = Math.min(...data);
    const range = max - min || 1;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((v, i) => {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((v - min) / range) * (h - 4) - 2;
        if(i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

function drawMergedStatGraph(canvasId, allStatData, colors, labels, statHistory, spHistory) {
    const canvas = document.getElementById(canvasId);
    if(!canvas || allStatData.length === 0 || allStatData[0].length === 0) return;
    
    const oldTip = document.getElementById('stat-graph-tooltip');
    if (oldTip) oldTip.remove();
    
    const tooltip = document.createElement('div');
    tooltip.id = 'stat-graph-tooltip';
    tooltip.style.cssText = 'display:none;position:fixed;background:#1a1420;border:2px solid #45c2e5;border-radius:6px;padding:.5rem;font-size:.75rem;pointer-events:none;z-index:9999;white-space:nowrap;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.5)';
    document.body.appendChild(tooltip);
    
    const ctx = canvas.getContext('2d');
    const w = canvas.offsetWidth || 400;
    const h = 120;
    canvas.width = w;
    canvas.height = h;
    ctx.clearRect(0, 0, w, h);
    
    const numStats = allStatData.length;
    const allVals = allStatData.flat();
    const max = Math.max(...allVals);
    const min = Math.min(...allVals);
    const range = max - min || 1;
    
    const getY = (v) => h - ((v - min) / range) * (h - 10) - 5;
    
    ctx.lineWidth = 2;
    for (let i = 0; i < numStats; i++) {
        const data = allStatData[i];
        ctx.strokeStyle = colors[i];
        ctx.beginPath();
        data.forEach((v, j) => {
            const x = (j / (data.length - 1)) * w;
            const y = getY(v);
            if(j === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
    
    const statKeys = ['speed','stamina','power','guts','wits'];
    
    function showTooltip(e) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const pageX = e.clientX;
        const pageY = e.clientY;
        let idx = Math.round((x / w) * (statHistory.length - 1));
        idx = Math.max(0, Math.min(idx, statHistory.length - 1));
        const stats = statHistory[idx];
        const sp = spHistory[idx] || 0;
        let tip = '<div style="font-weight:700;color:#45c2e5;margin-bottom:.25rem">Day ' + (idx + 1) + '</div>';
        labels.forEach((l, i) => {
            const v = i < 5 ? (stats[statKeys[i]] || stats[i] || 0) : sp;
            tip += '<div><span style="color:' + colors[i] + '">●</span> ' + l + ': ' + (typeof v === 'number' ? v.toFixed(2) : v) + '</div>';
        });
        tooltip.innerHTML = tip;
        tooltip.style.display = 'block';
        tooltip.style.left = (pageX - 140) + 'px';
        tooltip.style.top = (pageY - 80) + 'px';
    }
    
    function hideTooltip() {
        tooltip.style.display = 'none';
    }
    
    canvas.addEventListener('mousemove', showTooltip);
    canvas.addEventListener('mouseleave', hideTooltip);
}

function runSimulation(deckData, numSimulations = 11, maxTurns = 72, raceSchedule = [],

    numSimulations = Math.min(99999, Math.max(1, numSimulations));
    maxTurns = Math.min(78, Math.max(20, maxTurns));
    const engine = new SimulationEngine(deckData, [], [], {
        numSimulations,
        maxTurns,
        raceSchedule,
        statBonus,
